name: CI/CD Pipeline

on:
  push:
    branches:
      - "main"
    paths:
      - "**"
  pull_request:
    branches:
      - "main"

permissions:
  checks: write
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13" ]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Set up environment
        run: |
          echo "${{ matrix.python-version }}" > .python-version
          uv venv
          uv sync

      - name: Get Python path
        run: |
          PYTHON_BIN="$(uv run python -c 'import sys; print(sys.executable)')"
          echo "PYTHON_BIN=$PYTHON_BIN" >> $GITHUB_ENV

      - name: Run Pyright
        uses: jakebailey/pyright-action@v2
        with:
          python-path: ${{ env.PYTHON_BIN }}
          pylance-version: latest-release
      - name: Run Unit Tests with JUnit XML output
        run: uv run pytest tests/ --cov=src/my_project --cov-report=term-missing
          --cov-report=xml --junitxml=test-results.xml -v

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Python Unit Tests
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Check code format
        uses: astral-sh/ruff-action@v3
        with:
          args: check . --exit-non-zero-on-fix

      - name: Build package
        run: uv build
  all-matrix-jobs-passed:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Verify all matrix jobs succeeded
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Some matrix jobs of 'build' failed or were cancelled."
            exit 1
          fi
          echo "✅ All matrix jobs passed!"
